<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 16">
  <!-- Norwegian flag — official proportions 22:16
       Cross arms: vertical at x=6, w=4; horizontal at y=6, h=4
       Blue stripe centred inside each white arm (1 px white + 2 px blue + 1 px white) -->
  <rect width="22" height="16" fill="#BA0C2F"/>
  <!-- White cross -->
  <rect x="0"  y="6" width="22" height="4" fill="#FFFFFF"/>
  <rect x="6"  y="0" width="4"  height="16" fill="#FFFFFF"/>
  <!-- Blue cross -->
  <rect x="0"  y="7" width="22" height="2" fill="#00205B"/>
  <rect x="7"  y="0" width="2"  height="16" fill="#00205B"/>
</svg>
